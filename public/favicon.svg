<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <!-- الخلفية البيضاء -->
  <rect width="800" height="800" fill="#FFFFFF" />

  <g transform="translate(40, 20)">
    <!-- المبنى الرئيسي (الكبير) - الكحلي -->
    <path d="M 276 276 L 431 142 L 431 254 L 413 254 L 413 182 L 294 285 L 294 474 L 276 474 Z" fill="#132233" />
    
    <!-- المبنى الصغير - الأخضر -->
    <path d="M 408 290 L 492 354 L 492 465 L 474 465 L 474 380 L 426 343 L 426 460 L 408 460 Z" fill="#608038" />
    
    <!-- الأرضية والقاعدة السفلية للشعار -->
    <!-- القوس الكحلي العلوي والأيسر -->
    <path d="M 152 550 C 260 480, 460 460, 654 508 C 550 515, 380 540, 240 655 C 200 610, 175 580, 152 550 Z" fill="#132233" />
    
    <!-- الخطوط البيضاء الفاصلة داخل الأرضية -->
    <path d="M 226 545 Q 360 495 560 528" stroke="#FFFFFF" stroke-width="12" fill="none" stroke-linecap="round" />
    <path d="M 345 590 Q 420 540 600 535" stroke="#FFFFFF" stroke-width="10" fill="none" stroke-linecap="round" />
    
    <!-- الجزء الأخضر من الأرضية -->
    <path d="M 378 615 C 440 560, 530 540, 615 536 C 600 555, 550 590, 440 660 C 410 640, 395 625, 378 615 Z" fill="#608038" />
    
    <!-- الإطار السفلي على شكل حرف V المنحني -->
    <path d="M 152 572 C 220 630, 320 740, 400 770 C 480 740, 580 630, 648 572 C 580 640, 480 710, 400 735 C 320 710, 220 640, 152 572 Z" fill="#132233" />
    
    <!-- علامة الموقع (Location Pin) في الأسفل -->
    <g transform="translate(400, 700)">
      <!-- جسم العلامة الخارجي -->
      <path d="M 0 0 C -28 -28, -40 -45, -40 -65 C -40 -88, -22 -105, 0 -105 C 22 -105, 40 -88, 40 -65 C 40 -45, 28 -28, 0 0 Z" fill="#132233" />
      <!-- الدائرة البيضاء الداخلية -->
      <circle cx="0" cy="-65" r="16" fill="#FFFFFF" />
    </g>
  </g>
</svg>